<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
	<link href="css/estilos.css" rel="stylesheet">
	<title>Rafael Lozano-Hemmer</title>
</head>

<body>
	<div id="contenedor">
		<header class="centrado">
			<h1>Ejercicio</h1>
			<nav>
				<ul>
					<li><a href="index.html">Inicio</a></li>
					<li><a href="interactividad-espacio-arte.html">Interactividad, espacio público y arte tecnológico</a></li>
					<li><a href="ejercicio.html">Ejercicio</a></li>
				</ul>
			</nav>
		</header>

		<main>
			<form >
				<fieldset id="cantObras">
					<legend>Ingreso de datos</legend>
						<label for="cantidadObras">Cantidad de obras:</label>
						<input type="number" name="cantidad" id="cantidad">
							<br>
						<button type="button" id="cargarCantidad">Cargar Cantidad</button>
				</fieldset>

				<fieldset id="obra" disabled>
					<legend>Obra</legend>
						<label for="titulo">Título:</label>
						<input type="text" name="titulo" id="titulo">
							<br>
						<label for="cantLuces">Cantidad de luces x día:</label>
						<input type="number" name="cantLuces" id="cantLuces">
							<br>

						<label for="horasXdia">Cantidad de horas de funcionamiento x día:</label>
						<input type="number" name="horasXdia" id="horasXdia">
							<br>
						<button type="button" id="cargarObra">Cargar Obra</button>
				</fieldset>

				<fieldset id="consumoKwh" disabled>
					<legend>Consumo eléctrico:</legend>
					<label for="kwhXhora">Kwh/hr de cada luz:</label>
					<input type="number" name="kwhXhora" id="kwhXhora">
						<br>
					<label for="costoKwh">Costo del Kwh $:</label>
					<input type="number" name="costoKwh" id="costoKwh">
						<br>
					<button type="button" id="cargarConsumo">Cargar Consumo</button>
				</fieldset>

				<button type="button" id="enviarFormulario" disabled>Enviar Datos Cargados</button>
			</form>

			<button type="button" id="reset">Recargar Página</button>

			<div id="resumen"></div>
		</main>

		<footer class="centrado">
				<p>Para contactarse escribir a <a href="rafael@artedigital.com">rafael@artedigital.com</a></p>
		</footer>
	</div>

	<script src="js/script-ejercicio.js"></script>

</body>
</html>
